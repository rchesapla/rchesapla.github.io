<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC CALCULATOR PRO | Matrix Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #000800;
            --glass-bg: rgba(0, 20, 10, 0.9);
            --border-glow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Quantico", sans-serif;
            background: var(--dark-bg);
            color: var(--neon-green);
            overflow-x: hidden;
        }

        canvas#matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3;
        }

        .container {
            width: 95%; max-width: 900px; margin: 40px auto;
            background: var(--glass-bg); border: 1px solid var(--neon-green);
            border-radius: 15px; padding: 25px; box-shadow: var(--border-glow);
        }

        /* app.js'deki Lig Badge'i için stil */
        #leagueBadge {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            border: 1px solid var(--neon-green); font-size: 0.8rem; margin-bottom: 20px;
            cursor: pointer; transition: 0.3s;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }

        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #00ff9d; }
        
        input, select, textarea {
            width: 100%; background: rgba(0, 40, 20, 0.6);
            border: 1px solid #00aa2f; border-radius: 8px;
            color: #fff; padding: 12px; font-family: inherit;
        }

        .toggle-container { display: flex; gap: 10px; margin: 20px 0; }
        .btn {
            flex: 1; padding: 10px; border: 1px solid var(--neon-green);
            background: transparent; color: var(--neon-green); cursor: pointer;
        }
        .btn.active { background: var(--neon-green); color: #000; }

        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .results-table th { border-bottom: 1px solid var(--neon-green); padding: 10px; text-align: left; font-size: 0.8rem; }
        .results-table td { padding: 12px 10px; border-bottom: 1px solid rgba(0,255,65,0.1); font-size: 0.9rem; }

        #noDataMessage { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div id="leagueBadge">AUTO LEAGUE</div>

        <div class="input-grid">
            <div class="input-group">
                <label>MY MINING POWER</label>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="miningPower" placeholder="250.000">
                    <select id="powerUnit" style="width: 100px;">
                        <option value="GH">GH/s</option>
                        <option value="PH" selected>PH/s</option>
                        <option value="EH">EH/s</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>NETWORK DATA (PASTE HERE)</label>
                <textarea id="networkData" placeholder="Ağ verilerini buraya yapıştır..."></textarea>
            </div>
        </div>

        <div class="toggle-container">
            <button class="btn active" id="btnCrypto">CRYPTO</button>
            <button class="btn" id="btnUSD">USD ($)</button>
            <button class="btn" id="btnEUR">EUR (€)</button>
        </div>

        <div id="results">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>COIN</th>
                        <th>DAILY</th>
                        <th>MONTHLY</th>
                        <th>WITHDRAWAL</th>
                    </tr>
                </thead>
                <tbody id="earningsTableBody"></tbody>
            </table>
            <div id="noDataMessage">Veri bekleniyor...</div>
        </div>
        
        <button id="screenshotBtn" class="btn" style="margin-top: 20px; width: 100%;">GÖRÜNTÜ AL (PNG)</button>
    </div>

    <script src="app.js"></script>
    
    <script>
        // Matrix Arka Plan Efekti
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 20);
            drops = Array(columns).fill(1);
        }

        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = 'rgba(0, 8, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#00ff41';
            ctx.font = '15px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
