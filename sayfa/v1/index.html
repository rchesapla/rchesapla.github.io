<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCHesapla | Canlı Veri Desteği</title>
    <style>
        /* Tasarım sabit kaldı, sadece görsel geri bildirim için küçük eklemeler yapıldı */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #000800;
            color: #00ff41;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.4);
        }
        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.25;
        }
        .header { text-align: center; margin: 30px 0 40px; position: relative; z-index: 2; }
        h1 { font-size: 2.4em; color: #00ff41; text-shadow: 0 0 12px #00ff41, 0 0 24px #00ff41; letter-spacing: 4px; }
        .container {
            background: rgba(0, 20, 10, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #00ff41;
            border-radius: 12px;
            padding: 35px;
            max-width: 540px;
            width: 90%;
            margin: 0 auto 40px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #00ff9d; font-size: 0.9em; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #00aa2f;
            border-radius: 6px;
            background: rgba(0, 30, 15, 0.9);
            color: #00ff9d;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        input:focus, select:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 12px rgba(0, 255, 65, 0.5); }
        button {
            width: 100%;
            padding: 18px;
            background: #00ff41;
            color: #000800;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) { background: #00ff9d; transform: scale(1.02); box-shadow: 0 0 25px rgba(0, 255, 65, 0.8); }
        button:disabled { background: #00441b; color: #00772e; cursor: not-allowed; opacity: 0.6; }
        .results {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 40, 20, 0.9);
            border: 1px solid #00ff41;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.6s ease-out;
        }
        .result-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(0, 255, 65, 0.1); padding-bottom: 5px; }
        .val-crypto { color: #00ff41; font-weight: bold; }
        .val-fiat { color: #fff; font-size: 0.85em; opacity: 0.9; margin-left: 8px; }
        .price-info { font-size: 0.8em; text-align: center; margin-bottom: 15px; color: #ffcc00; }
        .live-status { font-size: 0.75em; text-align: center; color: #00ff41; margin-top: -15px; margin-bottom: 15px; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nota { font-size: 0.8em; color: #00aa2f; margin-top: 25px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="header">
        <h1>RC CALCULATOR PRO</h1>
    </div>

    <div class="container">
        <label>PARA BİRİMİ:</label>
        <select id="fiatSelect">
            <option value="usd">USD ($)</option>
            <option value="try">TRY (₺)</option>
        </select>

        <label>HESAPLANACAK COIN:</label>
        <select id="coinSelect">
            <option value="" disabled selected>Bir coin seçiniz...</option>
            <option value="rollertoken">RLT (RollerToken)</option>
            <option value="tether">USDT (Tether)</option>
            <option value="bitcoin">BTC (Bitcoin)</option>
            <option value="ethereum">ETH (Ethereum)</option>
            <option value="dogecoin">DOGE (Dogecoin)</option>
            <option value="solana">SOL (Solana)</option>
            <option value="binancecoin">BNB (Binance Coin)</option>
            <option value="polygon-ecosystem-token">POL (Polygon)</option>
            <option value="litecoin">LTC (Litecoin)</option>
        </select>

        <div id="liveStatus" class="live-status">Veriler güncelleniyor...</div>

        <label>KAZIM GÜCÜ (MY POWER):</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="myPower" placeholder="Örn: 250" step="0.01">
            <select id="myUnit" style="width: 100px;">
                <option value="th">TH/s</option>
                <option value="gh">GH/s</option>
                <option value="ph">PH/s</option>
                <option value="eh">EH/s</option>
            </select>
        </div>

        <label>AĞ GÜCÜ (NETWORK):</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="netPower" placeholder="Örn: 650" step="0.01">
            <select id="netUnit" style="width: 100px;">
                <option value="gh">GH/s</option>
                <option value="th">TH/s</option>
                <option value="ph">PH/s</option>
                <option value="eh" selected>EH/s</option>
            </select>
        </div>

        <label>BLOK ÖDÜLÜ (REWARD):</label>
        <input type="number" id="reward" placeholder="Örn: 3.125" step="0.00000001">

        <label>BLOK SÜRESİ (DAKİKA):</label>
        <input type="number" id="blockTime" value="10" step="0.1">

        <button id="calcBtn" onclick="calcular()" disabled>HESAPLA</button>

        <div id="results" class="results">
            <div id="priceDisplay" class="price-info">Veriler hazırlanıyor...</div>
            <div class="result-item"><span>Blok Başı:</span><div><span id="porBloque" class="val-crypto"></span></div></div>
            <div class="result-item"><span>Günlük:</span><div><span id="dia" class="val-crypto"></span><span id="diaFiat" class="val-fiat"></span></div></div>
            <div class="result-item"><span>Haftalık:</span><div><span id="semana" class="val-crypto"></span><span id="semanaFiat" class="val-fiat"></span></div></div>
            <div class="result-item"><span>Aylık (30G):</span><div><span id="mes" class="val-crypto"></span><span id="mesFiat" class="val-fiat"></span></div></div>
            <div class="result-item"><span>Yıllık:</span><div><span id="ano" class="val-crypto"></span><span id="anoFiat" class="val-fiat"></span></div></div>
        </div>

        <div class="nota">
            * Ağ verileri RollerCoin API üzerinden otomatik çekilir.<br>
            * Fiyatlar CoinGecko üzerinden anlık alınır.
        </div>
    </div>

    <script>
        // Matrix Rain Efekti
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = '01'.split('');
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 8, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- OTOMATİK VERİ ÇEKME MANTIĞI ---
        const coinSelect = document.getElementById('coinSelect');
        const liveStatus = document.getElementById('liveStatus');

        // RollerCoin Coin ID Eşleştirmeleri
        const rcMap = {
            'rollertoken': 'rlt',
            'bitcoin': 'btc',
            'ethereum': 'eth',
            'dogecoin': 'doge',
            'binancecoin': 'bnb',
            'polygon-ecosystem-token': 'pol',
            'solana': 'sol',
            'litecoin': 'ltc',
            'tether': 'usdt'
        };

        async function fetchLiveNetworkStats() {
            const coinId = coinSelect.value;
            if (!coinId) return;

            liveStatus.style.display = 'block';
            liveStatus.textContent = "Ağ verileri senkronize ediliyor...";
            liveStatus.style.color = "#00ff41";

            try {
                // Proxy üzerinden RollerCoin resmi API'sine istek atıyoruz
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://rollercoin.com/api/get-network-stats')}`);
                const data = await response.json();
                const stats = JSON.parse(data.contents);
                
                const rcId = rcMap[coinId];
                const coinData = stats.data[rcId];

                if (coinData) {
                    // Gücü birime göre ayarla (API genelde GHS döner, biz EH/PH kontrolü yapıyoruz)
                    const rawPower = parseFloat(coinData.network_power);
                    
                    // Otomatik Form Doldurma
                    document.getElementById('reward').value = coinData.reward;
                    document.getElementById('blockTime').value = 10; // RC varsayılan
                    
                    // Gücü EH/s cinsine çevirip yaz (Eğer güç çok büyükse)
                    const ehValue = rawPower / 1000000000; 
                    document.getElementById('netPower').value = ehValue.toFixed(3);
                    document.getElementById('netUnit').value = 'eh';

                    liveStatus.textContent = "Ağ verileri güncellendi!";
                    checkInputs();
                }
            } catch (error) {
                console.error("API Hatası:", error);
                liveStatus.textContent = "Ağ verisi alınamadı, manuel giriniz.";
                liveStatus.style.color = "#ff4141";
            }
        }

        coinSelect.addEventListener('change', fetchLiveNetworkStats);

        // --- HESAPLAMA MANTIĞI ---
        const inputs = document.querySelectorAll('#myPower, #netPower, #reward, #blockTime');
        const calcBtn = document.getElementById('calcBtn');

        function checkInputs() {
            let allFilled = true;
            inputs.forEach(input => {
                if (!input.value || parseFloat(input.value) <= 0) allFilled = false;
            });
            calcBtn.disabled = !allFilled;
        }

        inputs.forEach(input => input.addEventListener('input', checkInputs));

        const units = { gh: 0.001, th: 1, ph: 1000, eh: 1000000, zh: 1000000000 };

        async function fetchPrice(coinId, fiat) {
            try {
                let basePriceInUsd = 1.00;
                if(coinId !== 'tether' && coinId !== 'rollertoken') {
                    const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd`);
                    const data = await response.json();
                    basePriceInUsd = data[coinId].usd;
                }
                if (fiat === 'try') {
                    const rateResponse = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=try`);
                    const rateData = await rateResponse.json();
                    return basePriceInUsd * rateData.tether.try;
                }
                return basePriceInUsd;
            } catch (e) { return null; }
        }

        async function calcular() {
            const myP = parseFloat(document.getElementById('myPower').value) || 0;
            const myU = document.getElementById('myUnit').value;
            const netP = parseFloat(document.getElementById('netPower').value) || 0;
            const netU = document.getElementById('netUnit').value;
            const reward = parseFloat(document.getElementById('reward').value) || 0;
            const bTime = parseFloat(document.getElementById('blockTime').value) || 10;
            const coinId = document.getElementById('coinSelect').value;
            const fiat = document.getElementById('fiatSelect').value;

            const myTH = myP * units[myU];
            const netTH = netP * units[netU];
            const share = myTH / netTH;
            const porBloque = share * reward;
            const blocksDay = 1440 / bTime;

            const ganDia = porBloque * blocksDay;
            const ganSemana = ganDia * 7;
            const ganMes = ganDia * 30;
            const ganAno = ganDia * 365;

            document.getElementById('porBloque').textContent = porBloque.toFixed(10);
            document.getElementById('dia').textContent = ganDia.toFixed(8);
            document.getElementById('semana').textContent = ganSemana.toFixed(8);
            document.getElementById('mes').textContent = ganMes.toFixed(8);
            document.getElementById('ano').textContent = ganAno.toFixed(8);

            document.getElementById('results').style.display = 'block';
            document.getElementById('priceDisplay').textContent = "Kur verileri güncelleniyor...";
            
            const fiatPrice = await fetchPrice(coinId, fiat);
            const symbol = fiat === 'try' ? '₺' : '$';

            if (fiatPrice) {
                let coinLabel = coinId === 'rollertoken' ? 'RLT' : coinId.toUpperCase();
                document.getElementById('priceDisplay').textContent = `1 ${coinLabel} ≈ ${symbol}${fiatPrice.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                const formatFiat = (val) => ` (${symbol}${(val * fiatPrice).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})`;
                document.getElementById('diaFiat').textContent = formatFiat(ganDia);
                document.getElementById('semanaFiat').textContent = formatFiat(ganSemana);
                document.getElementById('mesFiat').textContent = formatFiat(ganMes);
                document.getElementById('anoFiat').textContent = formatFiat(ganAno);
            }
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
