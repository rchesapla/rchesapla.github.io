<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RCHesapla Mining Dashboard</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#0b0f1a;
font-family:'Inter',sans-serif;
color:#e5e7eb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:22px;
font-weight:700;
color:#60a5fa;
}

.stat-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
padding:15px;
transition:0.2s;
}

.stat-card:hover{
border-color:#3b82f6;
box-shadow:0 0 10px rgba(59,130,246,0.4);
transform:translateY(-2px);
}

.stat-label{
color:#9ca3af;
font-size:13px;
}

.stat-value{
font-size:20px;
font-weight:600;
margin-top:5px;
}

.panel{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:25px;
}

.panel-title{
font-size:16px;
margin-bottom:20px;
color:#9ca3af;
}

label{
font-size:13px;
color:#9ca3af;
}

input,select{
width:100%;
background:#020617;
border:1px solid #1f2937;
color:white;
padding:10px;
border-radius:6px;
margin-top:5px;
margin-bottom:15px;
}

.row{
display:flex;
gap:10px;
}

button{
background:#2563eb;
border:none;
padding:12px;
border-radius:8px;
width:100%;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
box-shadow:0 0 10px rgba(37,99,235,0.6);
}

footer{
text-align:center;
margin-top:40px;
font-size:13px;
opacity:0.6;
}

@media(max-width:900px){

.stat-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body onload="calculateGoalPower(), blockAmount()">

<div class="container">

<div class="topbar">
<div class="logo">⚡ RCHesapla</div>
</div>

<div class="stat-grid">

<div class="stat-card">
<div class="stat-label">Beklenen</div>
<div class="stat-value" id="exp_reward"></div>
</div>

<div class="stat-card">
<div class="stat-label">Günlük</div>
<div class="stat-value" id="daily"></div>
</div>

<div class="stat-card">
<div class="stat-label">Haftalık</div>
<div class="stat-value" id="weekly"></div>
</div>

<div class="stat-card">
<div class="stat-label">Aylık</div>
<div class="stat-value" id="monthly"></div>
</div>

</div>

<div class="panel">

<div class="panel-title">Mining Ayarları</div>

<label>Ağ Gücü</label>

<div class="row">
<input type="number" id="network-power" oninput="calculateGoalPower()">

<select id="network-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option selected value="ehs">EH/s</option>
</select>
</div>

<label>Kazım Gücü</label>

<div class="row">
<input type="number" id="goal-power" oninput="calculateGoalPower()">

<select id="goal-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option selected value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option value="ehs">EH/s</option>
</select>
</div>

<label>Blok Ödülü</label>

<div class="row">
<input type="number" id="block-reward" oninput="calculateGoalPower()">

<select id="block-type" onchange="blockAmount(), calculateGoalPower()">
<option value="btc">BITCOIN</option>
<option value="doge">DOGECOIN</option>
<option value="eth">ETHEREUM</option>
<option value="bnb">BINANCECOIN</option>
<option value="matic">MATIC</option>
<option value="sol">SOLANA</option>
<option value="trx">TRON</option>
<option value="ltc">LITECOIN</option>
</select>
</div>

<label>Blok Süresi (Dakika)</label>
<input type="number" value="10" id="block-timer" oninput="calculateGoalPower()">

<button onclick="calculateGoalPower()">
⚡ Hesapla
</button>

</div>

<footer>
<p>Bu site RollerCoin ile resmi bağlantılı değildir.</p>
<p>© 2026 RCHesapla</p>
</footer>

</div>

<script src="js/rchesaplama.js"></script>
<script src="js/haftalikodul.js"></script>

</body>
</html>
