<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCHesapla Crypto Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:'Inter',sans-serif;
}

/* SIDEBAR */
.sidebar{
position:fixed;
height:100vh;
width:240px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
transition:0.3s;
}

.sidebar h4{
font-weight:700;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:10px 12px;
color:#94a3b8;
text-decoration:none;
border-radius:8px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#1e293b;
color:white;
}

/* MAIN AREA */
.main{
margin-left:240px;
padding:30px;
transition:0.3s;
}

/* MOBILE NAV */
.mobile-nav{
display:none;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* CARDS */
.card{
background:#020617;
border:1px solid #1e293b;
border-radius:14px;
}

.stat-card{
padding:20px;
}

.stat-value{
font-size:22px;
font-weight:600;
}

/* FORM */
.form-control,.form-select{
background:#020617;
border:1px solid #334155;
color:white;
}

.form-control:focus{
border-color:#3b82f6;
box-shadow:none;
background:#020617;
color:white;
}

/* BUTTON */
.btn-primary{
background:#3b82f6;
border:none;
}

.btn-primary:hover{
background:#2563eb;
}

/* TABLE */
.table{
color:white;
}

.table thead{
background:#020617;
}

/* RESPONSIVE */
@media (max-width: 992px){

.sidebar{
left:-240px;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:20px;
}

.mobile-nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
}

.stat-card{
padding:15px;
}

.stat-value{
font-size:18px;
}

}

</style>
</head>

<body onload="calculateGoalPower(), blockAmount()">

<!-- MOBILE NAV -->
<div class="mobile-nav">
<button class="btn btn-dark" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</button>
<span class="fw-bold">RCHesapla</span>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h4>RCHesapla</h4>
<a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="./sayfa/hakkimizda/"><i class="bi bi-info-circle"></i> Hakkımızda</a>
<a href="./sayfa/nasilkullanilir/"><i class="bi bi-question-circle"></i> Nasıl Kullanılır</a>
<a href="./sayfa/sss/"><i class="bi bi-patch-question"></i> SSS</a>
<a href="https://discord.gg/rxeTK9wJU6"><i class="bi bi-discord"></i> Discord</a>
</div>

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">
<h3>Crypto Mining Calculator</h3>
<span class="text-secondary d-none d-md-block">RollerCoin Kazanç Tahmini</span>
</div>

<!-- STAT CARDS -->
<div class="row g-3 mb-4">

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Beklenen</div>
<div class="stat-value" id="exp_reward"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Günlük</div>
<div class="stat-value" id="daily"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Haftalık</div>
<div class="stat-value" id="weekly"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Aylık</div>
<div class="stat-value" id="monthly"></div>
</div>
</div>

</div>

<!-- CONTENT -->
<div class="row g-4">

<div class="col-lg-5">
<div class="card p-4">

<h5 class="mb-4">Mining Ayarları</h5>

<label class="mb-1">Ağ Gücü</label>
<div class="row g-2 mb-3">
<div class="col-7">
<input type="number" class="form-control" id="network-power" oninput="calculateGoalPower()">
</div>
<div class="col-5">
<select class="form-select" id="network-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option selected value="ehs">EH/s</option>
<option value="zhs">ZH/s</option>
</select>
</div>
</div>

<label class="mb-1">Kazım Gücü</label>
<div class="row g-2 mb-3">
<div class="col-7">
<input type="number" class="form-control" id="goal-power" oninput="calculateGoalPower()">
</div>
<div class="col-5">
<select class="form-select" id="goal-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option selected value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option value="ehs">EH/s</option>
<option value="zhs">ZH/s</option>
</select>
</div>
</div>

<label class="mb-1">Blok Ödülü</label>
<div class="row g-2 mb-3">
<div class="col-7">
<input type="number" class="form-control" id="block-reward" oninput="calculateGoalPower()">
</div>
<div class="col-5">
<select class="form-select" id="block-type" onchange="blockAmount(), calculateGoalPower()">
<option value="btc">BITCOIN</option>
<option value="doge">DOGECOIN</option>
<option value="eth">ETHEREUM</option>
<option value="bnb">BINANCECOIN</option>
<option value="matic">MATIC</option>
<option value="sol">SOLANA</option>
<option value="trx">TRON</option>
<option value="ltc">LITECOIN</option>
<option value="rst">SEASON TOKEN</option>
<option value="rlt">ROLLER TOKEN</option>
</select>
</div>
</div>

<label class="mb-1">Blok Süresi</label>
<div class="input-group mb-4">
<input type="number" class="form-control" value="10" id="block-timer" oninput="calculateGoalPower()">
<span class="input-group-text">DK</span>
</div>

<button class="btn btn-primary w-100" onclick="calculateGoalPower(), success()">
<i class="bi bi-cpu"></i> Hesapla
</button>

</div>
</div>

<div class="col-lg-7">

<div class="card p-4">

<h5 class="mb-4">Detaylı Kazanç Tablosu</h5>

<div class="table-responsive">
Yakında!
</div>

</div>

</div>

</div>

<footer class="text-center mt-5 text-secondary">
<p>Bu site RollerCoin ile resmi bağlantılı değildir.</p>
<p>© 2026 RCHesapla</p>
</footer>

</div>

<script>

function toggleSidebar(){
const sidebar = document.getElementById('sidebar');
sidebar.classList.toggle('active');
}

</script>

<script src="js/rchesaplama.js"></script>
<script src="js/haftalikodul.js"></script>
<script src="js/menüşablonu.js"></script>
<script src="js/gün-tarih-saat.js"></script>
<script src="js/tablo.js"></script>
<script src="js/selectbox.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
