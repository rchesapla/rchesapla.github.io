<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RCHesapla Crypto Dashboard</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#1f2937;
--muted:#6b7280;
--accent:#3b82f6;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
}

.topbar{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:12px 16px;
}

.logo-box{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:var(--accent);
color:white;
font-weight:700;
border-radius:8px;
}

.stat-card{
padding:20px;
transition:0.2s;
cursor:pointer;
}

.stat-card:hover{
transform:translateY(-3px);
border-color:var(--accent);
}

.stat-value{
font-size:22px;
font-weight:600;
}

.form-control,.form-select{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
}

.form-control:focus{
border-color:var(--accent);
box-shadow:none;
}

.btn-primary{
background:var(--accent);
border:none;
}

footer{
opacity:0.7;
font-size:13px;
}

</style>

</head>

<body onload="calculateGoalPower(), blockAmount()">

<div class="container py-4">

<div class="topbar d-flex justify-content-between align-items-center mb-4">

<div class="d-flex align-items-center gap-2">
<div class="logo-box">RC</div>
<h5 class="m-0">RCHesapla</h5>
</div>

</div>

<div class="row g-3 mb-4">

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Beklenen</div>
<div class="stat-value" id="exp_reward"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Günlük</div>
<div class="stat-value" id="daily"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Haftalık</div>
<div class="stat-value" id="weekly"></div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card stat-card">
<div class="text-secondary">Aylık</div>
<div class="stat-value" id="monthly"></div>
</div>
</div>

</div>

<div class="row g-4">

<div class="col-lg-6">

<div class="card p-4">

<h5 class="mb-4">Mining Ayarları</h5>

<label class="mb-1">Ağ Gücü</label>

<div class="row g-2 mb-3">

<div class="col-7">
<input type="number" class="form-control" id="network-power" oninput="calculateGoalPower()">
</div>

<div class="col-5">
<select class="form-select" id="network-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option selected value="ehs">EH/s</option>
</select>
</div>

</div>

<label class="mb-1">Kazım Gücü</label>

<div class="row g-2 mb-3">

<div class="col-7">
<input type="number" class="form-control" id="goal-power" oninput="calculateGoalPower()">
</div>

<div class="col-5">
<select class="form-select" id="goal-power-selector" onchange="calculateGoalPower()">
<option value="ghs">GH/s</option>
<option selected value="ths">TH/s</option>
<option value="phs">PH/s</option>
<option value="ehs">EH/s</option>
</select>
</div>

</div>

<label class="mb-1">Blok Ödülü</label>

<div class="row g-2 mb-3">

<div class="col-7">
<input type="number" class="form-control" id="block-reward" oninput="calculateGoalPower()">
</div>

<div class="col-5">
<select class="form-select" id="block-type" onchange="blockAmount(), calculateGoalPower()">
<option value="btc">BITCOIN</option>
<option value="doge">DOGECOIN</option>
<option value="eth">ETHEREUM</option>
<option value="bnb">BINANCECOIN</option>
<option value="matic">MATIC</option>
<option value="sol">SOLANA</option>
<option value="trx">TRON</option>
<option value="ltc">LITECOIN</option>
</select>
</div>

</div>

<label class="mb-1">Blok Süresi</label>

<div class="input-group mb-4">
<input type="number" class="form-control" value="10" id="block-timer" oninput="calculateGoalPower()">
<span class="input-group-text">DK</span>
</div>

<button class="btn btn-primary w-100" onclick="calculateGoalPower();">
<i class="bi bi-cpu"></i> Hesapla
</button>

</div>

</div>

</div>

<footer class="text-center mt-5">
<p>Bu site RollerCoin ile resmi bağlantılı değildir.</p>
<p>© 2026 RCHesapla</p>
</footer>

</div>

<script src="js/rchesaplama.js"></script>
<script src="js/haftalikodul.js"></script>

</body>
</html>
