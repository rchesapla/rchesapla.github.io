<!DOCTYPE html>
<html lang="tr" ng-app="miningApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC CALCULATOR PRO | Professional Edition</title>
    <link rel="shortcut icon" type="image/x-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc6e;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --reward-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 { font-size: 1.2rem; letter-spacing: 2px; color: var(--primary); font-weight: 800; }

        .wrapper { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-box { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        input, select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1); }

        .btn-main {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-transform: uppercase;
        }

        .btn-main:hover { transform: translateY(-2px); background: var(--primary-dark); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .res-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .res-val { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 600; display: block; }
        .res-label { font-size: 0.75rem; color: var(--text-dim); }
        .res-fiat { font-size: 0.8rem; color: var(--accent); }

        .price-ticker {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .power-input-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

        canvas#matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .manual-reward-box {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--reward-gold);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Canlı Veri Rozeti */
        .live-status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #ff0055;
            color: white;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body ng-controller="MiningController">

    <canvas id="matrix"></canvas>

    <nav class="navbar">
        <h1>RC CALCULATOR PRO</h1>
    </nav>

    <div class="wrapper">
        
        <div class="card">
            <div class="card-title">● SİSTEM ERİŞİMİ</div>
            <div style="display: flex; gap: 10px;">
                <input type="text" ng-model="userNick" placeholder="Rollercoin Kullanıcı Adı" ng-disabled="isAuthorized">
                <button class="btn-main" style="width: auto; padding: 0 20px;" ng-click="fetchUserData()" ng-disabled="loadingApi || !userNick || isAuthorized">
                    {{ isAuthorized ? 'AKTİF' : (loadingApi ? '...' : 'SİSTEMİ AKTİF ET') }}
                </button>
            </div>
        </div>

        <div ng-if="isAuthorized">
            
            <div class="card">
                <div class="card-title">● HESAPLAMA AYARLARI <span class="live-status" ng-if="isLive">CANLI BAĞLANTI AKTİF</span></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-box">
                        <label>PARA BİRİMİ</label>
                        <select ng-model="calcData.fiat">
                            <option value="usd">USD ($)</option>
                            <option value="try">TRY (₺)</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label>KRİPTO PARA</label>
                        <select ng-model="calcData.coin" ng-change="updateAutomaticData()">
                        <option value="rollertoken">RLT (RollerToken)</option>
                        <option value="seasontoken">RST (SeasonToken)</option>
                        <option value="bitcoin">BTC (Bitcoin)</option>
                        <option value="litecoin">LTC (Litecoin)</option>
                        <option value="binancecoin">BNB (Binance Coin)</option>
                        <option value="polygon-ecosystem-token">POL (Polygon)</option>
                        <option value="ripple">XRP (Ripple)</option>
                        <option value="dogecoin">DOGE (Dogecoin)</option>
                        <option value="ethereum">ETH (Ethereum)</option>
                        <option value="tether">USDT (Tether)</option>
                        <option value="solana">SOL (Solana)</option>
                        <option value="tron">TRX (Tron)</option>
                        <option value="algorand">ALGO (Algorand)</option>
                        </select>
                    </div>
                </div>

                <div class="manual-reward-box">
                    <label style="color: var(--reward-gold);">BLOK ÖDÜLÜ (GÜNCEL: {{lastUpdate}})</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" ng-model="calcData.reward" step="0.00000001" style="border-color: var(--reward-gold);">
                        <span style="font-weight: 800; color: var(--reward-gold);">{{calcData.coin.toUpperCase()}}</span>
                    </div>
                    <small style="color: var(--text-dim); font-size: 0.7rem; display: block; margin-top: 5px;" ng-if="calcData.coin == 'tether'">* USDT değeri RollerCoin'den canlı olarak çekilmektedir.</small>
                </div>

                <div class="input-box">
                    <label>KİŞİSEL GÜCÜNÜZ</label>
                    <div class="power-input-group">
                        <input type="number" ng-model="calcData.myPower">
                        <select ng-model="calcData.myUnit">
                            <option value="th">TH/s</option>
                            <option value="ph">PH/s</option>
                            <option value="eh">EH/s</option>
                        </select>
                    </div>
                </div>

                <div class="input-box">
                    <label>AĞ GÜCÜ (NETWORK POWER)</label>
                    <div class="power-input-group">
                        <input type="number" ng-model="calcData.netPower">
                        <select ng-model="calcData.netUnit">
                            <option value="eh">EH/s</option>
                            <option value="ph">PH/s</option>
                        </select>
                    </div>
                </div>

                <button class="btn-main" ng-click="calcular()">HESAPLAMAYI BAŞLAT</button>
            </div>

            <div id="results" class="card" style="display:none; border-top: 4px solid var(--primary);">
                <div class="price-ticker" id="priceDisplay">Fiyatlar Yükleniyor...</div>
                
                <div style="text-align: center; margin-bottom: 20px;">
                    <span class="res-label">SİZİN BLOK BAŞINA KAZANCINIZ</span>
                    <h2 class="res-val" id="porBloque" style="font-size: 1.5rem;">-</h2>
                </div>

                <div class="results-grid">
                    <div class="res-card">
                        <span class="res-label">GÜNLÜK</span>
                        <span class="res-val" id="dia">-</span>
                        <span class="res-fiat" id="diaFiat">-</span>
                    </div>
                    <div class="res-card">
                        <span class="res-label">HAFTALIK</span>
                        <span class="res-val" id="hafta">-</span>
                        <span class="res-fiat" id="haftaFiat">-</span>
                    </div>
                    <div class="res-card">
                        <span class="res-label">AYLIK</span>
                        <span class="res-val" id="mes">-</span>
                        <span class="res-fiat" id="mesFiat">-</span>
                    </div>
                    <div class="res-card">
                        <span class="res-label">YILLIK</span>
                        <span class="res-val" id="yil">-</span>
                        <span class="res-fiat" id="yilFiat">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = angular.module('miningApp', []);

        app.service('UserMinerService', ['$http', function($http) {
            this.getAllUserDataByNick = async function(nick) {
                const proxy = "https://morning-thunder-0ce3.wminerrc.workers.dev/?";
                const apiUser = `https://rollercoin.com/api/profile/public-user-profile-data/${nick}`;
                try {
                    const resUser = await $http.get(proxy + encodeURIComponent(apiUser));
                    if(!resUser.data.data) throw "Kullanıcı Yok";
                    const userId = resUser.data.data.avatar_id;
                    const apiPower = `https://rollercoin.com/api/profile/user-power-data/${userId}`;
                    const resPower = await $http.get(proxy + encodeURIComponent(apiPower));
                    return resPower.data.data;
                } catch(e) { throw e; }
            };
        }]);

        app.controller('MiningController', ['$scope', 'UserMinerService', '$timeout', '$http', function($scope, UserMinerService, $timeout, $http) {
            $scope.isAuthorized = false;
            $scope.isLive = false;
            $scope.lastUpdate = "Otomatik";
            $scope.calcData = {
                fiat: 'usd', coin: 'rollertoken', myPower: 0, myUnit: 'th',
                netPower: parseFloat(localStorage.getItem('rc_netPower')) || 0, 
                netUnit: localStorage.getItem('rc_netUnit') || 'eh', 
                reward: 0.88, blockTime: 10
            };

            const coinDefaults = {
                "rollertoken": 0.88, "seasontoken": 66, "bitcoin": 0.0000041,
                "litecoin": 0.0023, "binancecoin": 0.00035, "polygon-ecosystem-token": 2.29, "ripple": 0.16, "dogecoin": 3.84,
                "ethereum": 0.00021, "tether": 0.274038, "solana": 1, "algorand": 1111, "tron": 60
            };

            // --- CANLI VERİ ÇEKME FONKSİYONU ---
            $scope.fetchLiveReward = async function() {
                // Sadece USDT seçiliyse canlı veri çek
                if($scope.calcData.coin !== 'tether') return;

                try {
                    const response = await fetch('http://localhost:3000/get-raw-reward');
                    const data = await response.json();
                    if(data.success) {
                        $timeout(() => {
                            $scope.calcData.reward = parseFloat(data.reward);
                            $scope.isLive = true;
                            $scope.lastUpdate = data.time;
                        });
                    }
                } catch (e) {
                    console.warn("Canlı veri sunucusuna bağlanılamadı. Varsayılan değerler kullanılıyor.");
                    $scope.isLive = false;
                }
            };

            $scope.updateAutomaticData = () => { 
                $scope.calcData.reward = coinDefaults[$scope.calcData.coin] || 0.1; 
                if($scope.calcData.coin === 'tether') $scope.fetchLiveReward();
            };

            // Her 2 dakikada bir canlı veriyi tazele
            setInterval($scope.fetchLiveReward, 120000);

            $scope.fetchUserData = async function() {
                if(!$scope.userNick) return;
                $scope.loadingApi = true;
                try {
                    const data = await UserMinerService.getAllUserDataByNick($scope.userNick);
                    let thValue = parseFloat(data.current_power) / 1000;
                    if (thValue >= 1000000) { $scope.calcData.myPower = parseFloat((thValue / 1000000).toFixed(2)); $scope.calcData.myUnit = 'eh'; }
                    else if (thValue >= 1000) { $scope.calcData.myPower = parseFloat((thValue / 1000).toFixed(2)); $scope.calcData.myUnit = 'ph'; }
                    else { $scope.calcData.myPower = Math.round(thValue); $scope.calcData.myUnit = 'th'; }
                    $scope.isAuthorized = true;
                    // Giriş yapınca USDT seçiliyse canlı veriyi tetikle
                    $scope.fetchLiveReward();
                } catch(e) { alert("Hata: Kullanıcı bulunamadı."); }
                finally { $scope.loadingApi = false; $scope.$apply(); }
            };

            $scope.calcular = async function() {
                localStorage.setItem('rc_netPower', $scope.calcData.netPower);
                localStorage.setItem('rc_netUnit', $scope.calcData.netUnit);
                
                const units = { th: 1, ph: 1000, eh: 1000000 };
                const myTH = $scope.calcData.myPower * units[$scope.calcData.myUnit];
                const netTH = $scope.calcData.netPower * units[$scope.calcData.netUnit];
                
                if(!netTH || netTH <= 0) { alert("Ağ gücü giriniz."); return; }

                const porBloque = (myTH / netTH) * $scope.calcData.reward;
                const daily = porBloque * (1440 / $scope.calcData.blockTime);
                
                const coinKey = ($scope.calcData.coin === 'rollertoken') ? 'tether' : $scope.calcData.coin;
                
                try {
                    const priceRes = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinKey}&vs_currencies=usd,try`);
                    const priceData = await priceRes.json();
                    const currentPrice = priceData[coinKey][$scope.calcData.fiat];

                    $timeout(() => {
                        const sym = $scope.calcData.fiat === 'try' ? '₺' : '$';
                        document.getElementById('porBloque').innerText = porBloque.toFixed(10);
                        document.getElementById('dia').innerText = daily.toFixed(8);
                        document.getElementById('hafta').innerText = (daily * 7).toFixed(6);
                        document.getElementById('mes').innerText = (daily * 30).toFixed(6);
                        document.getElementById('yil').innerText = (daily * 365).toFixed(4);
                        document.getElementById('diaFiat').innerText = `${sym}${(daily * currentPrice).toFixed(2)}`;
                        document.getElementById('haftaFiat').innerText = `${sym}${(daily * 7 * currentPrice).toFixed(2)}`;
                        document.getElementById('mesFiat').innerText = `${sym}${(daily * 30 * currentPrice).toFixed(2)}`;
                        document.getElementById('yilFiat').innerText = `${sym}${(daily * 365 * currentPrice).toFixed(2)}`;
                        document.getElementById('priceDisplay').innerText = `1 ${$scope.calcData.coin.toUpperCase()} ≈ ${sym}${currentPrice.toFixed(4)}`;
                        document.getElementById('results').style.display = 'block';
                    }, 100);
                } catch(e) { alert("Fiyat verisi çekilemedi. (Biraz bekleyin sayfayı tekrar yükler misin?)"); }
            };
        }]);

        // Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let cols = Math.floor(w / 20), drops = Array(cols).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.1)'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#00ff88'; ctx.font = '15px monospace';
            for(let i=0; i<drops.length; i++) {
                ctx.fillText(Math.floor(Math.random()*2), i*20, drops[i]*20);
                if(drops[i]*20 > h && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }, 50);
    </script>
</body>
</html>
