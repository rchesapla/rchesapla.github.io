<!DOCTYPE html>
<html lang="tr" ng-app="miningApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC MINER TRACKER - 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --rare: #3b82f6;
            --epic: #a855f7;
            --legendary: #eab308;
            --unreal: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .navbar h1 { font-size: 1.1rem; letter-spacing: 2px; color: var(--primary); font-weight: 800; }
        .wrapper { max-width: 1000px; margin: 20px auto; padding: 0 15px; }

        .search-card {
            background: var(--card-bg);
            border-radius: 16px; padding: 20px;
            margin-bottom: 20px;
            display: flex; gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            flex: 1; background: #0f172a; border: 1px solid #334155;
            padding: 12px 16px; border-radius: 10px; color: white;
        }

        .btn-fetch {
            background: var(--primary); color: #000; border: none;
            padding: 0 25px; border-radius: 10px; font-weight: 800; cursor: pointer;
        }

        /* Madenci Kartları Tasarımı */
        .miner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .miner-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .miner-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .miner-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        
        .miner-name { font-weight: 700; font-size: 0.9rem; color: var(--text-main); line-height: 1.2; max-width: 70%; }
        
        .level-badge {
            font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
            font-weight: 800; text-transform: uppercase;
        }

        /* Seviye Renkleri */
        .lvl-common { background: #64748b; color: white; }
        .lvl-uncommon { background: #22c55e; color: white; }
        .lvl-rare { background: var(--rare); color: white; }
        .lvl-epic { background: var(--epic); color: white; }
        .lvl-legendary { background: var(--legendary); color: black; }
        .lvl-unreal { background: var(--unreal); color: white; }

        .miner-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 600; }
        .pwr-color { color: var(--accent); }
        .bonus-color { color: var(--primary); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body ng-controller="MinerController">

    <div class="loading-overlay" ng-if="isLoading">
        <div style="color: var(--primary); font-weight: 800; letter-spacing: 2px;">VERİLER YÜKLENİYOR...</div>
    </div>

    <nav class="navbar">
        <h1>ROLLERCOIN MINER INVENTORY</h1>
    </nav>

    <div class="wrapper">
        <div class="search-card">
            <input type="text" ng-model="userNick" placeholder="Kullanıcı Adı Girin (Örn: FthCLK)">
            <button class="btn-fetch" ng-click="fetchMiners()" ng-disabled="!userNick || isLoading">GETİR</button>
        </div>

        <div ng-if="miners.length > 0">
            <div style="margin-bottom: 15px; font-size: 0.8rem; color: var(--text-dim);">
                Toplam Madenci: <span style="color: var(--primary)">{{miners.length}}</span>
            </div>
            
            <div class="miner-grid">
                <div class="miner-card" ng-repeat="miner in miners">
                    <div class="miner-header">
                        <div class="miner-name">{{miner.name}}</div>
                        <span class="level-badge lvl-{{miner.level_label.toLowerCase()}}">{{miner.level_label}}</span>
                    </div>
                    
                    <div class="miner-stats">
                        <div class="stat-box">
                            <span class="stat-label">Güç</span>
                            <span class="stat-value pwr-color">{{miner.power}} GH/s</span>
                        </div>
                        <div class="stat-box" style="text-align: right;">
                            <span class="stat-label">Bonus</span>
                            <span class="stat-value bonus-color">+{{miner.bonus_power / 100}}%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" ng-if="miners.length === 0 && !isLoading" style="text-align: center; padding: 40px; color: var(--text-dim); background: var(--card-bg); border-radius: 16px;">
            Madencileri listelemek için bir kullanıcı adı sorgulayın.
        </div>
    </div>

    <script>
        const app = angular.module('miningApp', []);

        app.controller('MinerController', ['$scope', '$http', function($scope, $http) {
            const proxy = "https://morning-thunder-0ce3.wminerrc.workers.dev/?";
            const miner_levels = ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary', 'Unreal'];
            
            $scope.miners = [];
            $scope.isLoading = false;

            $scope.fetchMiners = async function() {
                $scope.isLoading = true;
                $scope.miners = [];
                
                try {
                    // 1. Kullanıcı Profili
                    const uUrl = encodeURIComponent(`https://rollercoin.com/api/profile/public-user-profile-data/${$scope.userNick}`);
                    const userRes = await $http.get(proxy + uUrl);
                    
                    if(userRes.data.error !== "") throw "Kullanıcı bulunamadı!";
                    const avatarId = userRes.data.data.avatar_id;

                    // 2. Oda/Miner Konfigürasyonu
                    const rUrl = encodeURIComponent(`https://rollercoin.com/api/game/room-config/${avatarId}`);
                    const roomRes = await $http.get(proxy + rUrl);

                    if(roomRes.data.data && roomRes.data.data.miners) {
                        $scope.$apply(() => {
                            $scope.miners = roomRes.data.data.miners.map(m => {
                                return {
                                    name: m.name,
                                    power: m.power,
                                    bonus_power: m.bonus_power,
                                    level_label: miner_levels[m.level] || 'Basic'
                                };
                            });
                        });
                    }

                } catch (e) {
                    alert("Hata oluştu: " + e);
                } finally {
                    $scope.$apply(() => { $scope.isLoading = false; });
                }
            };
        }]);
    </script>
</body>
</html>
