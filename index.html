<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollerCoin Geri Sayım</title>

<style>
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top,#0b1220,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
    background:#0f172a;
    padding:40px;
    border-radius:16px;
    box-shadow:0 0 40px rgba(0,255,170,0.15);
}

h1{
    margin:0;
    font-size:28px;
    color:#22c55e;
    letter-spacing:1px;
}

.subtitle{
    opacity:0.7;
    margin-top:6px;
    font-size:14px;
}

.timer{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:30px;
}

.box{
    background:#020617;
    border:1px solid #1e293b;
    padding:22px;
    border-radius:12px;
    min-width:90px;
    box-shadow:0 0 20px rgba(34,197,94,0.15);
}

.number{
    font-size:34px;
    font-weight:bold;
    color:#4ade80;
}

.label{
    font-size:12px;
    opacity:0.6;
    margin-top:4px;
}

.footer{
    margin-top:25px;
    font-size:13px;
    opacity:0.6;
}

@media(max-width:600px){

.container{
    padding:25px;
}

.number{
    font-size:26px;
}

.box{
    padding:16px;
    min-width:70px;
}

h1{
    font-size:22px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="timer">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">Gün</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">Saat</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">Dakika</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">Saniye</div>
</div>

</div>

</div>

<script>

const aylar = {
"Ocak":0,
"Şubat":1,
"Mart":2,
"Nisan":3,
"Mayıs":4,
"Haziran":5,
"Temmuz":6,
"Ağustos":7,
"Eylül":8,
"Ekim":9,
"Kasım":10,
"Aralık":11
};

function turkceTarihCevir(tarih){

let parca = tarih.split(" ");

let gun = parseInt(parca[0]);
let ay = aylar[parca[1]];
let yil = parseInt(parca[2]);

let saat=0;
let dakika=0;
let saniye=0;

if(parca[3]){
let zaman = parca[3].split(":");
saat = parseInt(zaman[0]);
dakika = parseInt(zaman[1]);
saniye = parseInt(zaman[2] || 0);
}

return new Date(yil, ay, gun, saat, dakika, saniye).getTime();

}

let hedefTarih = turkceTarihCevir("23 Aralık 2026 00:00:00");

setInterval(function(){

let simdi = new Date().getTime();
let fark = hedefTarih - simdi;

let gun = Math.floor(fark / (1000*60*60*24));
let saat = Math.floor((fark % (1000*60*60*24)) / (1000*60*60));
let dakika = Math.floor((fark % (1000*60*60)) / (1000*60));
let saniye = Math.floor((fark % (1000*60)) / 1000);

document.getElementById("days").innerHTML = gun;
document.getElementById("hours").innerHTML = saat;
document.getElementById("minutes").innerHTML = dakika;
document.getElementById("seconds").innerHTML = saniye;

},1000);

</script>

</body>
</html>
