<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geri Sayım</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
}

.timer{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:20px;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    min-width:70px;
}

.number{
    font-size:32px;
    font-weight:bold;
}

.label{
    font-size:12px;
    opacity:0.7;
}

@media(max-width:600px){
    .number{
        font-size:24px;
    }
    .box{
        padding:15px;
        min-width:60px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="timer">
<div class="box">
<div id="days" class="number">0</div>
<div class="label">Gün</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">Saat</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">Dakika</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">Saniye</div>
</div>
</div>

</div>

<script>

const aylar = {
"Ocak":0,
"Şubat":1,
"Mart":2,
"Nisan":3,
"Mayıs":4,
"Haziran":5,
"Temmuz":6,
"Ağustos":7,
"Eylül":8,
"Ekim":9,
"Kasım":10,
"Aralık":11
};

function turkceTarihCevir(tarih){

let parca = tarih.split(" ");

let gun = parseInt(parca[0]);
let ay = aylar[parca[1]];
let yil = parseInt(parca[2]);

let saat=0;
let dakika=0;
let saniye=0;

if(parca[3]){
let zaman = parca[3].split(":");
saat = parseInt(zaman[0]);
dakika = parseInt(zaman[1]);
saniye = parseInt(zaman[2] || 0);
}

return new Date(yil, ay, gun, saat, dakika, saniye).getTime();

}

let hedefTarih = turkceTarihCevir("23 Aralık 2026 00:00:00");

setInterval(function(){

let simdi = new Date().getTime();
let fark = hedefTarih - simdi;

let gun = Math.floor(fark / (1000*60*60*24));
let saat = Math.floor((fark % (1000*60*60*24)) / (1000*60*60));
let dakika = Math.floor((fark % (1000*60*60)) / (1000*60));
let saniye = Math.floor((fark % (1000*60)) / 1000);

document.getElementById("days").innerHTML = gun;
document.getElementById("hours").innerHTML = saat;
document.getElementById("minutes").innerHTML = dakika;
document.getElementById("seconds").innerHTML = saniye;

},1000);

</script>

</body>
</html>
