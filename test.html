<!DOCTYPE html>
<html lang="tr" ng-app="miningApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RollerCoin Madencilik Hesaplayıcı v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #00ff88;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ff4444;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        #matrix {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: 0.15;
        }

        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        /* Üst Bar */
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 12px; margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
        }

        /* Ana Panel */
        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 25px; margin-bottom: 20px;
        }

        .grid-layout {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;
        }

        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        /* Form Elemanları */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px;
            background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            color: white; font-family: 'Fira Code', monospace;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn {
            cursor: pointer; padding: 12px 20px; border-radius: 8px; border: none;
            font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; justify-content: center; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Sonuç Kartları */
        .results-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px;
        }
        .res-card {
            background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 10px;
            border-left: 3px solid var(--accent);
        }
        .res-val { font-family: 'Fira Code'; font-size: 1.2rem; display: block; margin-top: 5px; }

        /* Profil Özeti */
        .profile-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-badge {
            font-size: 0.7rem; padding: 4px 8px; border-radius: 4px;
            background: var(--accent); color: #000; text-transform: uppercase;
        }

        /* Geçmiş Listesi */
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 8px 12px;
            border-radius: 6px; margin-bottom: 5px; font-size: 0.85rem;
        }
        .history-item:hover { background: rgba(0, 255, 136, 0.1); }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .roi-card { background: linear-gradient(45deg, #1e293b, #0f172a); border: 1px gold solid !important; }
    </style>
</head>
<body ng-controller="MiningController">

    <canvas id="matrix"></canvas>

    <div class="container">
        
        <div class="header-bar">
            <div>
                <i class="fas fa-microchip" style="color: var(--accent);"></i>
                <span style="font-weight: 700; letter-spacing: 1px; margin-left: 10px;">WMINER RC</span>
            </div>
            <div style="text-align: right; font-family: 'Fira Code';">
                <div id="current-time">00:00:00</div>
                <div id="current-date" style="font-size: 0.8rem; color: var(--text-dim);">01.01.2024</div>
            </div>
        </div>

        <div class="grid-layout">
            
            <div>
                <div class="glass-panel">
                    <h3 style="margin-top: 0;"><i class="fas fa-user-circle"></i> Kullanıcı Girişi</h3>
                    <div class="input-group">
                        <input type="text" ng-model="userNick" placeholder="RollerCoin Kullanıcı Adı" ng-disabled="isAuthorized">
                    </div>
                    <button class="btn btn-primary" ng-click="fetchUserData()" ng-if="!isAuthorized">
                        <i class="fas fa-search"></i> PROFILI GETIR
                    </button>
                    <button class="btn btn-danger" style="background: var(--danger); color: white; width:100%" ng-click="logoutUser()" ng-if="isAuthorized">
                        <i class="fas fa-sign-out-alt"></i> OTURUMU KAPAT
                    </button>
                    
                    <div style="margin-top: 20px;">
                        <label>Aktif Kullanıcılar: <span id="active-count" style="color: var(--accent);">0</span></label>
                        <label>Toplam Sorgulama: <span style="color: var(--accent);">{{totalCalculations}}</span></label>
                    </div>
                </div>

                <div class="glass-panel">
                    <h3><i class="fas fa-history"></i> Son Sorgulananlar</h3>
                    <div ng-repeat="historyNick in userHistory track by $index" class="history-item">
                        <span ng-click="quickFetch(historyNick)" style="cursor:pointer">{{historyNick}}</span>
                        <i class="fas fa-times" ng-click="removeFromHistory($index)" style="color: var(--danger); cursor:pointer"></i>
                    </div>
                </div>
            </div>

            <div>
                <div class="glass-panel" ng-if="isAuthorized">
                    <div class="profile-header">
                        <div style="flex-grow: 1;">
                            <span class="status-badge">Aktif Profil</span>
                            <h2 style="margin: 5px 0;">{{userNick}}</h2>
                            <small style="color: var(--text-dim)">
                                <i class="fas fa-key"></i> Oda Yapılandırma ID: 
                                <span style="color: var(--accent)">{{userRoomId}}</span>
                            </small>
                        </div>
                        <div style="text-align: right;">
                            <label>Sorgu Sayısı</label>
                            <div style="font-size: 1.5rem; color: var(--accent);">{{currentUserCalcs}}</div>
                        </div>
                    </div>

                    <div class="grid-layout" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>Kazılacak Coin</label>
                            <select ng-model="calcData.coin" ng-change="updateFromLiveData()">
                                <option value="RLT">RLT (RollerToken)</option>
                                <option value="BTC">Bitcoin (BTC)</option>
                                <option value="ETH">Ethereum (ETH)</option>
                                <option value="BNB">Binance Coin (BNB)</option>
                                <option value="SOL">Solana (SOL)</option>
                                <option value="DOGE">Dogecoin (DOGE)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Lig Seviyesi</label>
                            <select ng-model="calcData.leagueId" ng-options="l.id as l.name for l in leagues" ng-change="updateLeagueData()">
                            </select>
                        </div>
                    </div>

                    <div class="grid-layout" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>Kişisel Gücünüz</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="number" ng-model="calcData.myPower">
                                <select ng-model="calcData.myUnit" style="width: 80px;">
                                    <option value="gh">GH/s</option>
                                    <option value="th">TH/s</option>
                                    <option value="ph">PH/s</option>
                                    <option value="eh">EH/s</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Para Birimi</label>
                            <select ng-model="calcData.fiat">
                                <option value="usd">Dolar ($)</option>
                                <option value="try">Türk Lirası (₺)</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn btn-primary" ng-click="calcular()" style="margin-top: 10px;">
                        <i class="fas fa-calculator"></i> HESAPLA
                    </button>
                </div>

                <div id="results" class="glass-panel" style="display: none; border-top: 3px solid var(--accent);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;"><i class="fas fa-chart-line"></i> Tahmini Kazançlar</h3>
                        <span id="priceDisplay" style="font-size: 0.8rem; background: rgba(0,255,136,0.1); padding: 5px 10px; border-radius: 20px;"></span>
                    </div>

                    <div class="results-grid">
                        <div class="res-card">
                            <label>Blok Başına</label>
                            <span class="res-val" id="porBloque">0</span>
                        </div>
                        <div class="res-card">
                            <label>Günlük (Fiat)</label>
                            <span class="res-val" id="diaFiat" style="color: var(--accent);">0</span>
                        </div>
                        <div class="res-card">
                            <label>Günlük Adet</label>
                            <span class="res-val" id="dia">0</span>
                        </div>
                        <div class="res-card">
                            <label>Aylık Adet</label>
                            <span class="res-val" id="mes">0</span>
                        </div>
                    </div>

                    <div id="roiCard" class="res-card roi-card" style="margin-top: 15px; display: none;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <label>Amorti (ROI) Tahmini</label>
                                <span class="res-val" id="roiResult" style="color: #ffd700;">-</span>
                            </div>
                            <div style="text-align: right;">
                                <label>Maliyet</label>
                                <input type="number" ng-model="calcData.minerCost" ng-change="updateROI()" placeholder="Cihaz Fiyatı" style="width: 100px; padding: 5px;">
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px; font-size: 0.7rem; color: var(--text-dim); text-align: center;">
                        Son Güncelleme: {{lastUpdate}}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="sablon.js"></script>
</body>
</html>
