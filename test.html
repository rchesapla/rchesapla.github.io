<!DOCTYPE html>
<html lang="tr" ng-app="miningApp">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RollerCoin League Calculator</title>

<link rel="shortcut icon" href="img/logov2.png">

<!-- INDEX1 ile aynı css -->
<link rel="stylesheet" href="./css/anasablon.css">
<link rel="stylesheet" href="./css/genelkazanc.css">
<link rel="stylesheet" href="./css/profil.css">
<link rel="stylesheet" href="./css/tablo.css">
<link rel="stylesheet" href="./css/fonts.css">
<link rel="stylesheet" href="./css/minerlistesi.css">
<link rel="stylesheet" href="./css/ustbar.css">

</head>

<body>

<!-- ÜST BAR -->
<div class="ustbar">
    <div class="ustbar-icerik">
        <img src="img/logov2.png" class="logo">
        <span class="site-baslik">ROLLERCOIN LEAGUE CALCULATOR</span>
    </div>
</div>

<!-- ANA CONTAINER -->
<div class="anasablon">

    <!-- SAYFA BAŞLIK -->
    <div class="profil-kutu">
        <h1>League Kazanç Hesaplayıcı</h1>
        <p>League sisteminde günlük kazancını hesapla</p>
    </div>

    <!-- BUTONLAR -->
    <div class="profil-kutu">
        <a href="network-analyzer.html" class="buton">
            Network Growth Analyzer
        </a>

        <a href="league-transition.html" class="buton">
            League Transition Tool
        </a>
    </div>

    <!-- HESAPLAMA ALANI -->
    <div class="profil-kutu">

        <h2>League Hesaplama</h2>

        <div class="form-grup">
            <label>Kazım Gücü (TH/s)</label>
            <input type="number" id="power">
        </div>

        <div class="form-grup">
            <label>Lig</label>
            <select id="league">
                <option>Wood</option>
                <option>Bronze</option>
                <option>Silver</option>
                <option>Gold</option>
            </select>
        </div>

        <button class="buton">Hesapla</button>

    </div>

</div>

</body>
</html>
